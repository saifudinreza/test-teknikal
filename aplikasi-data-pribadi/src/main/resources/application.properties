# ============================================================
# KONFIGURASI DATABASE
# Bayangkan bagian ini seperti "kartu identitas" agar aplikasi
# tahu harus menghubungi database mana dan pakai password apa
# ============================================================

spring.datasource.url=jdbc:mysql://localhost:3306/db_datapribadi?useSSL=false&serverTimezone=Asia/Jakarta
spring.datasource.username=root
spring.datasource.password=Masreza2003
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# KONFIGURASI JPA / HIBERNATE
# ============================================================

# ddl-auto=update: Hibernate akan otomatis membuat/update tabel di database
# sesuai dengan @Entity yang kita buat. Tidak perlu buat tabel manual di MySQL.
spring.jpa.hibernate.ddl-auto=update

# Tampilkan query SQL yang dijalankan di console (berguna untuk debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# PENTING: Pastikan Hibernate buat tabel DULU, baru data.sql dieksekusi
# Tanpa ini, data.sql akan error karena tabel belum ada
spring.jpa.defer-datasource-initialization=true

# ============================================================
# KONFIGURASI DATA.SQL (Seed Data)
# ============================================================

# always = jalankan data.sql setiap kali aplikasi start
# (INSERT IGNORE di data.sql mencegah duplikasi data)
spring.sql.init.mode=always

# ============================================================
# KONFIGURASI SERVER
# ============================================================
server.port=8080
