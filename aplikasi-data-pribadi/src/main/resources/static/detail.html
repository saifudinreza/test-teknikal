<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Data Karyawan</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <style>
        /* Tampilan khusus untuk mode detail: input disabled terlihat lebih bersih */
        input:disabled, textarea:disabled, select:disabled {
            background-color: #f8f9fa !important;
            color: #212529 !important;
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container">
            <span class="navbar-brand fw-bold">&#128100;&#128203; Aplikasi Data Pribadi</span>
        </div>
    </nav>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-6">

                <div class="card shadow-sm">
                    <div class="card-header">
                        <h5 class="mb-0">&#128065; Detail Data Karyawan</h5>
                    </div>
                    <div class="card-body">

                        <!-- Semua field di bawah ini akan di-disabled oleh form.js
                             (hanya untuk tampilan, tidak bisa diubah) -->

                        <!-- NIK -->
                        <div class="mb-3">
                            <label for="nik" class="form-label fw-semibold">NIK</label>
                            <input type="text" id="nik" class="form-control">
                        </div>

                        <!-- Nama Lengkap -->
                        <div class="mb-3">
                            <label for="namaLengkap" class="form-label fw-semibold">Nama Lengkap</label>
                            <input type="text" id="namaLengkap" class="form-control">
                            <div class="invalid-feedback" id="namaLengkapError"></div>
                        </div>

                        <!-- Jenis Kelamin -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Jenis Kelamin</label>
                            <div class="d-flex gap-4">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           name="jenisKelamin" id="lakiLaki" value="Laki-laki">
                                    <label class="form-check-label" for="lakiLaki">Laki-laki</label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio"
                                           name="jenisKelamin" id="perempuan" value="Perempuan">
                                    <label class="form-check-label" for="perempuan">Perempuan</label>
                                </div>
                            </div>
                        </div>

                        <!-- Tanggal Lahir -->
                        <div class="mb-3">
                            <label for="tanggalLahir" class="form-label fw-semibold">Tanggal Lahir</label>
                            <input type="date" id="tanggalLahir" class="form-control">
                        </div>

                        <!-- Alamat -->
                        <div class="mb-3">
                            <label for="alamat" class="form-label fw-semibold">Alamat</label>
                            <textarea id="alamat" class="form-control" rows="3"></textarea>
                        </div>

                        <!-- Negara -->
                        <div class="mb-4">
                            <label for="negara" class="form-label fw-semibold">Negara</label>
                            <select id="negara" class="form-select"></select>
                        </div>

                        <!-- Hanya ada tombol Kembali (tidak ada tombol Simpan/Ubah) -->
                        <div class="d-flex gap-2">
                            <a href="index.html" class="btn btn-secondary">Kembali</a>
                        </div>

                    </div><!-- /card-body -->
                </div><!-- /card -->

            </div><!-- /col -->
        </div><!-- /row -->
    </div><!-- /container -->

    <script src="https://code.jquery.com/jquery-3.7.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/form.js"></script>

</body>
</html>
